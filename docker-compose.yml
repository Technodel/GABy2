version: '3.9'

services:
  gaby:
    build: .
    container_name: gaby
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - gaby_data:/data
    environment:
      - NODE_ENV=production
      - GABY_PORT=3000
      - GABY_DB_PATH=/data/gaby.db
      - GABY_SECRET_JWT=${GABY_SECRET_JWT}
      - GABY_ADMIN_PASSWORD=${GABY_ADMIN_PASSWORD}
      - GABY_ALLOWED_ORIGIN=${GABY_ALLOWED_ORIGIN}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  gaby_data:
    driver: local
